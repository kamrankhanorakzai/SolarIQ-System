on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

# =========================
#  CI PIPELINE
# =========================
  project-testing:
    runs-on: ubuntu-latest

    env:
      AWS_HOST: 127.0.0.1
      AWS_PORT: 5433
      AWS_DB: ${{ secrets.AWS_DB }}
      AWS_USER: ${{ secrets.AWS_USER }}
      AWS_PASS: ${{ secrets.AWS_PASS }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # SSH SETUP
      # =========================
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # =========================
      # START SSH TUNNEL (STABLE)
      # =========================
      - name: Start SSH Tunnel to RDS
        run: |
          echo "Starting SSH tunnel..."

          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=5 \
            -N \
            -L 5433:${{ secrets.RDS_ENDPOINT }}:5432 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} &

          echo $! > tunnel.pid

          echo "Waiting for tunnel to stabilize..."
          sleep 10

      # =========================
      # VERIFY TUNNEL
      # =========================
      - name: Verify tunnel connection
        run: |
          sudo apt-get update && sudo apt-get install -y netcat

          nc -zv 127.0.0.1 5433 || (echo "❌ Tunnel failed" && exit 1)

      # =========================
      # PYTHON SETUP
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # RUN DVC PIPELINE
      # =========================
      - name: Run DVC pipeline
        run: dvc repro

      - name: Push DVC data to S3
        run: dvc push

      # =========================
      # TESTS
      # =========================
      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest -v

      # =========================
      # CLEANUP TUNNEL
      # =========================
      - name: Kill SSH Tunnel
        if: always()
        run: |
          kill $(cat tunnel.pid) || true


# =========================
#  PRODUCTION PIPELINE
# =========================
  production:
    needs: project-testing
    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # DOCKER LOGIN
      # =========================
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # =========================
      # BUILD IMAGE
      # =========================
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/solar:latest .

      # =========================
      # PUSH IMAGE
      # =========================
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/solar:latest

      # =========================
      # DEPLOY TO EC2
      # =========================
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "==== Cleaning Docker system ===="

            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm $(docker ps -aq) 2>/dev/null || true
            docker system prune -af || true

            echo "==== Pulling latest image ===="
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/solar:latest

            echo "==== Running container ===="
            docker run -d -p 80:8000 --env-file .env ${{ secrets.DOCKER_HUB_USERNAME }}/solar:latest

            echo "==== Deployment completed ===="