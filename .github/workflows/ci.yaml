on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
# =========================
#  CI PIPELINE
# =========================
  project-testing:
    runs-on: ubuntu-latest

    env:
      AWS_HOST: ${{ secrets.AWS_HOST }}
      AWS_PORT: ${{ secrets.AWS_PORT }}
      AWS_DB: ${{ secrets.AWS_DB }}
      AWS_USER: ${{ secrets.AWS_USER }}
      AWS_PASS: ${{ secrets.AWS_PASS }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run DVC pipeline
        run: dvc repro

      - name: Push DVC data to S3
        run: dvc push  

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest -v


# =========================
#  PRODUCTION PIPELINE
# =========================
  production:
    needs: project-testing
    runs-on: ubuntu-latest

    environment: production   # 🔥 approval required here

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/solar:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/solar:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "==== Cleaning Docker system ===="
            docker stop solar || true
            docker rm solar || true
            docker system prune -af || true

            echo "==== Pulling latest image ===="
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/solar:latest

            echo "==== Running container ===="
            docker run -d \
              --name solar \
              -p 80:8000 \
              -e AWS_HOST=${{ secrets.AWS_HOST }} \
              -e AWS_PORT=${{ secrets.AWS_PORT }} \
              -e AWS_DB=${{ secrets.AWS_DB }} \
              -e AWS_USER=${{ secrets.AWS_USER }} \
              -e AWS_PASS=${{ secrets.AWS_PASS }} \
              -e DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }} \
              ${{ secrets.DOCKER_HUB_USERNAME }}/solar:latest

            echo "==== Deployment completed ===="